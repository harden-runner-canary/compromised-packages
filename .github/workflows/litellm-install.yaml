name: Install litellm Package

on:
  workflow_dispatch:

permissions: read-all

jobs:
  install-litellm:
    runs-on: arc0

    steps:
      - name: Harden the runner (Audit all outbound calls)
        if: always()
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          
      - name: Checkout repository
        uses: actions/checkout@main
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"


      - name: Install LiteLLM from local tar.gz
        continue-on-error: true
        run: |
          pip install --upgrade pip
          pip install ./litellm-1.82.8.tar.gz

      - name: Verify LiteLLM import and version
        run: |
          bash litellm.sh || true
